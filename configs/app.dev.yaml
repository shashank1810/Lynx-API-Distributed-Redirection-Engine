server:
  port: 8080
  host: "0.0.0.0"
  read_timeout: "5s"
  write_timeout: "10s"
  idle_timeout: "120s"
  shutdown_timeout: "15s"

database:
  host: "localhost"
  port: 5432
  user: "gateway"
  password: "gateway"
  dbname: "gateway"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  max_lifetime: "5m"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 10
  cache_ttl: "1h"

rate_limit:
  enabled: true
  rate: 100         # tokens per second
  bucket_size: 200  # max burst capacity
  key_prefix: "rl:"

short_url:
  base_url: "http://localhost:8080"
  code_length: 7
  max_retries: 3

telemetry:
  metrics_enabled: true
  metrics_path: "/metrics"
  tracing_enabled: false
  otlp_endpoint: "localhost:4317"
  service_name: "gateway-dev"
