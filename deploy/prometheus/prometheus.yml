global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gateway"
    metrics_path: "/metrics"
    scrape_interval: 5s
    static_configs:
      - targets: ["gateway:8080"]
        labels:
          service: "gateway"
          environment: "docker"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
